<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verkadala Hub | Official</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --bg: #020617; --glass: rgba(15, 23, 42, 0.75); --accent: #6366f1; --border: rgba(255,255,255,0.1); }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans',sans-serif; }
        body { background: var(--bg); color:white; min-height:100vh; display:flex; flex-direction:column; align-items:center; overflow-x:hidden; }
        #canvas { position:fixed; z-index:-1; top:0; left:0; width:100%; height:100%; }

        nav { width:92%; max-width:1100px; background:var(--glass); backdrop-filter:blur(20px); border:1px solid var(--border); padding:15px 25px; border-radius:24px; margin-top:20px; display:flex; justify-content:space-between; align-items:center; z-index:100; }
        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links a { color: #94a3b8; text-decoration: none; font-size: 0.8rem; font-weight: 800; transition: 0.3s; }
        
        .container { width:92%; max-width:1100px; display:grid; grid-template-columns: 1fr 2fr 1fr; gap:25px; margin-top:30px; z-index:10; }
        .card { background:var(--glass); backdrop-filter:blur(35px); border:1px solid var(--border); border-radius:30px; padding:25px; height: fit-content; animation: fadeIn 0.8s ease forwards; }

        .rank-item { display:flex; align-items:center; gap:12px; padding:12px; background:rgba(255,255,255,0.03); border-radius:18px; margin-bottom:10px; border:1px solid var(--border); transition: 0.3s; }
        .pfp { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--border); }

        .about-text { font-size: 0.85rem; line-height: 1.6; color: #94a3b8; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #22c55e; box-shadow: 0 0 8px #22c55e; } .idle { background: #fbbf24; } .dnd { background: #ef4444; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } .nav-links { display: none; } }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <nav>
        <div style="font-weight:800; font-size:1.1rem;">VERKADALA HUB</div>
        <ul class="nav-links">
            <li><a href="#">DASHBOARD</a></li>
            <li><a href="#">MODS</a></li>
        </ul>
        <div style="font-size: 0.7rem; font-weight: 800; color: #22c55e;">● LIVE</div>
    </nav>

    <div class="container">
        <div style="display:flex; flex-direction:column; gap:20px;">
            <div class="card" style="text-align:center">
                <p style="font-size:0.7rem; opacity:0.6;">CURRENT COUNT</p>
                <h1 id="curr" style="font-size:3rem; color:var(--accent)">0</h1>
            </div>
            <div class="card">
                <h3 style="font-size:0.9rem; margin-bottom:15px; color:var(--accent)">ABOUT SERVER</h3>
                <p class="about-text">This server is <b>unhinged server made by ruwaidcool</b>. Enter at your own risk pangu! 💀🔥</p>
            </div>
        </div>

        <div class="card">
            <h2 style="margin-bottom:20px;">🏆 TOP YAPPER RANKINGS</h2>
            <div id="lb-list"></div>
        </div>

        <div style="display:flex; flex-direction:column; gap:20px;">
            <div class="card">
                <h3 style="font-size:0.8rem; margin-bottom:15px; color:#22c55e">LIVE (<span id="on-count">0</span>)</h3>
                <div id="on-list"></div>
            </div>
            <div class="card">
                <h3 style="font-size:0.8rem; margin-bottom:15px; color:#fbbf24">😴 AFK</h3>
                <div id="afk-list"></div>
            </div>
        </div>
    </div>

    <footer style="margin: 40px 0; font-size:0.8rem; opacity:0.6;">Crafted with ❤️ by <b>Ruwaid</b></footer>

    <script>
        async function fetchAll() {
            try {
                const [s, o, c, a] = await Promise.all([
                    fetch('/api/stats').then(r => r.json()),
                    fetch('/api/online').then(r => r.json()),
                    fetch('/api/counting').then(r => r.json()),
                    fetch('/api/afk').then(r => r.json())
                ]);
                document.getElementById('curr').innerText = c.current || 0;
                document.getElementById('on-count').innerText = o.count || 0;
                document.getElementById('lb-list').innerHTML = s.map(u => `
                    <div class="rank-item">
                        <img src="${u.avatar}" class="pfp">
                        <div style="flex:1"><b>${u.username}</b><br><small style="opacity:0.5">${u.role}</small></div>
                        <div style="font-weight:800; color:var(--accent)">${u.count}</div>
                    </div>`).join('') || '<p style="text-align:center; opacity:0.5;">Loading...</p>';
                document.getElementById('on-list').innerHTML = o.members.map(m => `
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px; font-size:0.85rem;">
                        <div class="status-dot ${m.status}"></div>
                        <img src="${m.avatar}" style="width:24px; border-radius:50%">
                        <span>${m.username}</span>
                    </div>`).join('');
                document.getElementById('afk-list').innerHTML = a.length ? a.map(u => `
                    <div class="rank-item" style="border-color: rgba(251,191,36,0.2); padding:10px;">
                        <img src="${u.avatar}" style="width:30px; border-radius:50%">
                        <div style="overflow:hidden"><b>${u.username}</b><br><small>"${u.reason}"</small></div>
                    </div>`).join('') : '<p style="font-size:0.7rem; opacity:0.5; text-align:center">No one AFK 🔥</p>';
            } catch (e) { console.log("Site warming up..."); }
        }
        setInterval(fetchAll, 10000); fetchAll();
        const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
        canvas.width=window.innerWidth; canvas.height=window.innerHeight;
        let p=[];for(let i=0;i<60;i++)p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,s:Math.random()*1,dx:Math.random()*0.2-0.1,dy:Math.random()*0.2-0.1});
        function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);p.forEach(i=>{i.x+=i.dx;i.y+=i.dy;if(i.x>canvas.width)i.x=0;ctx.fillStyle="rgba(255,255,255,0.2)";ctx.beginPath();ctx.arc(i.x,i.y,i.s,0,Math.PI*2);ctx.fill()});requestAnimationFrame(animate)}animate();
    </script>
</body>
</html>
