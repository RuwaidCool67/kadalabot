<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verkadala Stop | ver2_a</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --glass: rgba(15, 23, 42, 0.4); --accent: #38bdf8; --border: rgba(255, 255, 255, 0.08); }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; overflow: hidden; }

        /* Splash Screen */
        #splash { position: fixed; inset: 0; background: #020617; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: 0.8s; text-align: center; }
        .splash-text { letter-spacing: 5px; font-weight: 800; color: var(--accent); font-size: 0.75rem; text-transform: uppercase; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* Liquid Background */
        .blurry-bg { position: fixed; inset: 0; z-index: -1; filter: blur(80px); }
        .blob { position: absolute; width: 80vw; height: 80vw; background: var(--accent); border-radius: 50%; opacity: 0.1; animation: move 20s infinite alternate; }
        @keyframes move { from { transform: translate(-10%,-10%); } to { transform: translate(15%,15%); } }

        /* Navigation */
        nav { width: 94%; max-width: 800px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); padding: 12px 20px; position: fixed; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; border-radius: 100px; display: flex; justify-content: space-between; align-items: center; }
        .join-btn { background: var(--accent); color: #020617; padding: 8px 16px; border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 0.7rem; }

        .main { padding: 100px 4% 40px; max-width: 900px; margin: 0 auto; }
        .card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; padding: 22px; margin-bottom: 20px; }
        
        /* Member List Styling */
        .on-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .user-pill { background: rgba(255,255,255,0.05); padding: 6px 14px; border-radius: 50px; border: 1px solid var(--border); font-size: 0.75rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .user-pill img { width: 18px; border-radius: 50%; }

        .item { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 18px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="splash"><div class="splash-text">POWERED BY<br>RUWAIDCOOL SOFTWARE</div></div>
    <div class="blurry-bg"><div class="blob"></div></div>

    <nav>
        <b style="color: var(--accent); font-size: 0.9rem;">VERKADALA STOP</b>
        <a href="https://discord.com/invite/7C6wX7cFDw" target="_blank" class="join-btn">JOIN</a>
    </nav>

    <div class="main">
        <div class="card" style="text-align:center">
            <p style="opacity:0.6; font-size:0.6rem; text-transform:uppercase;">Total Kadalais</p>
            <h1 id="total-mem" style="font-size: 4rem; color: var(--accent); letter-spacing: -3px;">0</h1>
        </div>

        <div class="card">
            <h4>🟢 ONLINE KADALAIS</h4>
            <div id="on-list" class="on-list"></div>
        </div>

        <div class="card">
            <h4>💬 AT A GLANCE (LIVE)</h4>
            <div id="chat-feed" style="margin-top:15px;"></div>
        </div>
    </div>

    <script>
        // Splash logic
        setTimeout(() => { 
            const s = document.getElementById('splash');
            s.style.opacity = '0';
            document.body.style.overflow = 'auto';
            setTimeout(() => s.style.display = 'none', 800);
        }, 2000);

        function render(data) {
            if(!data) return;
            document.getElementById('total-mem').innerText = data.totalKadalais || 0;
            
            // Render Online Pills
            document.getElementById('on-list').innerHTML = (data.onlineKadalais?.members || []).map(m => `
                <div class="user-pill"><img src="${m.avatar}">${m.username}</div>`).join('') || 'Quiet sea...';

            // Render Chat Log
            document.getElementById('chat-feed').innerHTML = (data.chat || []).map(m => `
                <div class="item">
                    <div><b>${m.author}</b><br><small style="opacity:0.6">${m.content}</small></div>
                    <span style="margin-left:auto; font-size:0.6rem; opacity:0.3;">${m.time}</span>
                </div>`).join('') || 'No messages.';
        }

        async function fetchAll() {
            try {
                const res = await fetch('/api/all');
                const data = await res.json();
                render(data);
            } catch(e) { console.log("Brewing..."); }
        }
        fetchAll(); setInterval(fetchAll, 30000);
    </script>
</body>
</html>
