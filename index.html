<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verkadala Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --bg: #020617; --glass: rgba(15, 23, 42, 0.9); --accent: #6366f1; --border: rgba(255,255,255,0.1); }
        html { scroll-behavior: smooth; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans',sans-serif; }
        body { background: var(--bg); color:white; min-height:100vh; }
        
        /* FULL WIDTH WHITE NAV */
        nav { 
            width: 100%; background: #ffffff; padding: 20px 6%; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { color: #020617; font-weight: 800; font-size: 1.4rem; text-decoration: none; }
        .links { display: flex; gap: 30px; list-style: none; }
        .links a { color: #020617; text-decoration: none; font-size: 0.85rem; font-weight: 800; }

        .main { padding: 40px 6%; max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 320px 1fr 320px; gap: 30px; }
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 24px; padding: 25px; margin-bottom: 30px; }
        
        .pfp { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent); }
        .item { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 15px; }
        
        footer { padding: 60px; text-align: center; opacity: 0.6; font-size: 0.9rem; border-top: 1px solid var(--border); }
        
        /* Mobile Stack */
        @media (max-width: 1100px) { .main { grid-template-columns: 1fr; } .links { display: none; } }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">VERKADALA HUB</a>
        <ul class="links">
            <li><a href="#">DASHBOARD</a></li>
            <li><a href="#staff-wall">MODS</a></li>
            <li><a href="#system-wall">SYSTEM</a></li>
        </ul>
        <div style="color:#22c55e; font-weight:900;">LIVE ●</div>
    </nav>

    <div class="main">
        <div>
            <div class="card" style="text-align:center">
                <p style="opacity:0.6; font-size:0.7rem;">CURRENT COUNT</p>
                <h1 id="curr" style="font-size:3.5rem; color:var(--accent)">0</h1>
            </div>
            <div class="card">
                <h3>ABOUT</h3>
                <p style="font-size:0.8rem; margin-top:10px; color:#94a3b8">Unhinged server made by <b>ruwaidcool</b>. 💀</p>
            </div>
        </div>

        <div>
            <div class="card">
                <h2>🏆 TOP YAPPER RANKINGS</h2>
                <div id="lb-list"></div>
            </div>
            
            <div class="card" id="staff-wall">
                <h2>👑 STAFF WALL</h2>
                <div id="staff-list" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:15px;"></div>
            </div>

            <div class="card" id="system-wall">
                <h2>⚙️ SYSTEM DIAGNOSTICS</h2>
                <div id="sys-info" style="margin-top:10px; font-size:0.9rem;"></div>
            </div>
        </div>

        <div>
            <div class="card">
                <h3>ONLINE (<span id="on-count">0</span>)</h3>
                <div id="on-list"></div>
            </div>
            <div class="card">
                <h3>😴 AFK MAMBAS</h3>
                <div id="afk-list"></div>
            </div>
        </div>
    </div>

    <footer>Made with ❤️ by <b>Ruwaid</b></footer>

    <script>
        async function fetchAll() {
            try {
                const [s, o, c, a, st, sys] = await Promise.all([
                    fetch('/api/stats').then(r => r.json()),
                    fetch('/api/online').then(r => r.json()),
                    fetch('/api/counting').then(r => r.json()),
                    fetch('/api/afk').then(r => r.json()),
                    fetch('/api/staff').then(r => r.json()),
                    fetch('/api/system').then(r => r.json())
                ]);

                document.getElementById('curr').innerText = c.current;
                document.getElementById('on-count').innerText = o.count;
                
                document.getElementById('lb-list').innerHTML = s.map(u => `<div class="item"><img src="${u.avatar}" class="pfp"><div><b>${u.username}</b><br><small>${u.count} msgs</small></div></div>`).join('');
                document.getElementById('staff-list').innerHTML = st.map(u => `<div style="text-align:center"><img src="${u.avatar}" class="pfp"><br><b>${u.username}</b><br><small style="color:var(--accent)">${u.role}</small></div>`).join('');
                document.getElementById('sys-info').innerHTML = `<p>Ping: ${sys.ping} | Uptime: ${sys.uptime} | Status: ${sys.status}</p>`;
                document.getElementById('on-list').innerHTML = o.members.map(m => `<div class="item"><img src="${m.avatar}" style="width:25px; border-radius:50%"> ${m.username}</div>`).join('');
                document.getElementById('afk-list').innerHTML = a.map(u => `<div class="item">😴 ${u.username}: ${u.reason}</div>`).join('') || 'None';

            } catch(e) { console.log("Updating..."); }
        }
        // Updates every 10 mins (600,000 ms) as requested
        setInterval(fetchAll, 600000); 
        fetchAll();
    </script>
</body>
</html>
